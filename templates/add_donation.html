<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Add Food Donation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>Add Food Donation</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label>Food Name</label>

<input
type="text"
name="food_name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Quantity</label>

<input
type="text"
name="quantity"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Expiry Date</label>

<input
type="date"
name="expiry_date"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Pickup Address</label>

<input
type="text"
name="pickup_address"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Description</label>

<textarea
name="description"
class="form-control"
rows="4"></textarea>

</div>

<button
class="btn btn-success">

Add Donation

</button>

<a
href="/donor"
class="btn btn-secondary">

Back

</a>

</form>

</div>

</div>

</div>

</body>

</html>
